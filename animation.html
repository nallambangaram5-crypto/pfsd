<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="animation.css">
</head>
<body>
    <h1>
        CSS ANIMATION EXAMPLES
    </h1>
    <h2> Entrances </h2>
    <div class="flex-container">
        <div class="flex-item slideDown">slide down</div>
        <div class="flex-item slideUp">slide up</div>
        <div class="flex-item slideLeft">slide left</div>
        <div class="flex-item slideExpandUp ">expand up</div>
        <div class="flex-item fadeIn">fade in</div>
        <div class="flex-item bigEntrance">big entrance</div>
        
    </div>
    <h2>Hover</h2>
    <div class="flex-container">
        <div class="flex-item pulse">pulse</div>
        <div class="flex-item floating">floating</div>
        <div class="flex-item tossing">tossing</div>
        <div class="flex-item  fade">fade</div>
        <div class="flex-item grow">grow</div>
        <div class="flex-item circle">circle</div>
    </div>
    <div class=" flex-container">
        <div class="flex-item curls">curls</div>
        <div class="flex-item bubble-bottom">bubble bottom</div>

    <div class="flex-item">
        <div class="light">light</div>
    </div>
</div>

    
</body>
</html>
