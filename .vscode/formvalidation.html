<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form id="joinform">
        <label> name (must fill!): </label>
        <input type="text" id="nameinput" required minlength="3"><br><br>
        <label> email(must look like email!):
        </label>
        <input type="email" id="emailinput" required><br><br>
        <label> age (must be number!):</label>
        <input type="number" id="ageinput" min="13" max="120" required><br><br>
        <button type="submit"> join!</button>
    </form>
    <div id="output"></div>
    <script>
        document.getElementById("joinform").addEventListener("submit", function(e){
            e.preventDefault();
            const name=document.getElementById("nameinput").value;
            const email=document.getElementById("emailinput").value;
            const age=document.getElementById("ageinput").value;
            document.getElementById("output").innerHTML=`
            name:${name},email:${email},age:${age}`;

        });
    </script>
</body>
</html>
